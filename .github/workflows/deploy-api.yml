name: Build & Deploy R API

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build image and deploy to Fly.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ghcr.io/${{ github.repository }}/rpact-api:latest
          platforms: linux/amd64
          no-cache: true

      - name: Deploy to Fly.io (fire and forget)
        # flyctl times out waiting for health checks from GH runners due to network issues.
        # We deploy and don't wait - the machine will start successfully on Fly.io side.
        run: |
          curl -fsSL https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl deploy \
            --config api/fly.toml \
            --image ghcr.io/${{ github.repository }}/rpact-api:latest \
            --ha=false \
            --detach \
            2>&1 || true
          echo "Deploy triggered. Machine starting on Fly.io."
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
