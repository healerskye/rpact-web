name: Deploy R Plumber API to Render

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": "do_not_clear"}' | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          deploy = d.get('deploy', d)
          print('Deploy ID:', deploy.get('id'))
          print('Status:', deploy.get('status'))
          "

      - name: Wait for deploy to complete
        run: |
          echo "Waiting for Render build (R + rpact install takes ~8 min)..."
          for i in $(seq 1 40); do
            sleep 30
            STATUS=$(curl -s \
              "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys?limit=1" \
              -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
              -H "Accept: application/json" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          print(d[0]['deploy']['status'] if d else 'unknown')
          ")
            echo "  [$i/40] Status: $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "Deploy successful!"
              exit 0
            elif [ "$STATUS" = "build_failed" ] || [ "$STATUS" = "deactivated" ]; then
              echo "Deploy failed with status: $STATUS"
              exit 1
            fi
          done
          echo "Timed out waiting for deploy"
          exit 1
