name: Build & Deploy R API

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build image and deploy to Fly.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        run: curl -fsSL https://fly.io/install.sh | sh

      - name: Build image (standard docker, no buildx)
        # Use plain docker build so the image is available locally for smoke test and flyctl
        run: docker build -t rpact-api:local ./api

      - name: Smoke test - verify R packages load
        run: |
          echo "=== R library paths ==="
          docker run --rm rpact-api:local Rscript -e ".libPaths()"
          echo "=== Installed packages ==="
          docker run --rm rpact-api:local Rscript -e "ip <- installed.packages(); cat(ip[,'Package'], sep='\n')"
          echo "=== Load plumber ==="
          docker run --rm rpact-api:local Rscript -e "library(plumber); cat('plumber OK\n')"
          echo "=== Load rpact ==="
          docker run --rm rpact-api:local Rscript -e "library(rpact); cat('rpact OK\n')"

      - name: Destroy existing machines (clear crash loop)
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          MACHINES=$(flyctl machines list --app rpact-api --json 2>/dev/null | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          print(' '.join([m['id'] for m in data if m.get('state') != 'destroyed']))" 2>/dev/null || echo "")
          for m in $MACHINES; do
            echo "Destroying machine $m"
            flyctl machines destroy "$m" --app rpact-api --force 2>&1 || true
          done
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to Fly.io
        run: |
          export PATH="$HOME/.fly/bin:$PATH"
          flyctl deploy \
            --config api/fly.toml \
            --local-only \
            --image rpact-api:local \
            --ha=false \
            --detach \
            2>&1 || true
          echo "Deploy triggered."
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
